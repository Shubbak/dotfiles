background {
    monitor = 
    path = $HOME/Pictures/Wallpapers/no_dark_bg/basmalah_on_beige.jpg
    blur_passes = 2
    blur_size = 1
    brightness = 0.8
    vibrancy = 0.1
}


label {
  monitor =
  text = cmd[update:1000] date +"%A, %d. %B"
  color = rgba(100, 55, 20, 1.0)
  font_size = 22
  font_family = JetBrains Mono
  position = 0, 270
  halign = center
  valign = center
}

label {
  monitor = 
  text = cmd[update:1000] date +"%H:%M:%S"
  color = rgba(100, 55, 20, 1.0)
  font_size = 60
  font_family = JetBrains Mono Bold
  position = 0, 200
  halign = center
  valign = center
}
