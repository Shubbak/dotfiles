input-field {
    monitor =
    size = 200, 60
    outline_thickness = 0
    position = 0, -250
    halign = center
    valign = center
    # placeholder_text = <i>Password</i>
    placeholder_text = توكّل على الله
    font_family = Scheherazade New
    fade_on_empty = false
    outer_color = rgba(100, 55, 20, 1.0)
    inner_color = rgba(100, 55, 20, 0.2)
}

label {
    monitor = 
    # text = $USER
    text = السَّلام عليكَ أبا حمزة 
    text = cmd[update:60000] echo "$(h=$(date +%H); if [ $h -lt 9 ]; then echo صبّحك الله بالخير أبا حَمزة; elif [ $h -lt 18 ]; then echo السَّلام عليكَ أبا حَمزة ; else echo مساء الخير أبا حَمزة; fi)"
    font_family = Scheherazade New
    font_size = 40
    position = 0, 400
    halign = center
    valign = center
    color = rgba(100, 55, 20, 1.0)
}

